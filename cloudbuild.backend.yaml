options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SERVICE: "previa-api"
  _REGION: "southamerica-east1"
  _AR_REGION: "southamerica-east1"
  _AR_REPO: "previa"
  _IMAGE_NAME: "previa-api"
  _CLOUD_SQL_CONNECTION_NAME: "SEU_PROJECT:SEU_REGION:SUA_INSTANCE"
  _DATABASE_URL_SECRET: "DATABASE_URL"
  _APIFOOTBALL_KEY_SECRET: "APIFOOTBALL_KEY"
  _THE_ODDS_API_KEY_SECRET: "THE_ODDS_API_KEY"
  _OPS_TRIGGER_TOKEN_SECRET: "OPS_TRIGGER_TOKEN"

steps:
  - name: "gcr.io/cloud-builders/docker"
    dir: "backend"
    args:
      - "build"
      - "-t"
      - "${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--project=$PROJECT_ID"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--image=${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=1Gi"
      - "--timeout=3600"
      - "--concurrency=1"
      - "--min-instances=0"
      - "--max-instances=1"
      - "--add-cloudsql-instances=${_CLOUD_SQL_CONNECTION_NAME}"
      - "--env-vars-file=backend/cloudrun.env.yaml"
      - "--set-secrets=DATABASE_URL=${_DATABASE_URL_SECRET}:latest"
      - "--set-secrets=APIFOOTBALL_KEY=${_APIFOOTBALL_KEY_SECRET}:latest"
      - "--set-secrets=THE_ODDS_API_KEY=${_THE_ODDS_API_KEY_SECRET}:latest"
      - "--set-secrets=OPS_TRIGGER_TOKEN=${_OPS_TRIGGER_TOKEN_SECRET}:latest"

images:
  - "${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$COMMIT_SHA"