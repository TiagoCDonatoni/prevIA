options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: "node:20"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        cd frontend
        npm ci
        npm run build

  - name: "node:20"
    entrypoint: "bash"
    args:
      - "-lc"
      - |
        npm install -g firebase-tools
        firebase deploy --project "$PROJECT_ID" --only hosting:landing --non-interactive